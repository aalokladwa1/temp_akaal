version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: akaal_mysql_smoke
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: akaal_smoke
      MYSQL_USER: akaal_user
      MYSQL_PASSWORD: akaal_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16
    container_name: akaal_postgres_smoke
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: akaal_smoke
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d akaal_smoke"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
  postgres_data:
