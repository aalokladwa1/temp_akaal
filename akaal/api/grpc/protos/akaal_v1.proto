syntax = "proto3";

package akaal.v1;

option go_package = "akaal/v1;akaalv1";
option java_package = "com.akaal.api.v1";

service AkaalService {
  rpc SubmitJob (JobRequest) returns (JobResponse);
  rpc GetJobStatus (JobStatusRequest) returns (JobStatusResponse);
  rpc StreamJobLogs (JobLogsRequest) returns (stream JobLogChunk);
  rpc ExecuteWorkflow (WorkflowRequest) returns (WorkflowResponse);
  rpc GetClusterStatus (ClusterStatusRequest) returns (ClusterStatusResponse);
}

message JobRequest {
  string job_type = 1;
  string payload_json = 2;
  int32 priority = 3;
  string tenant_id = 4;
}

message JobResponse {
  string job_id = 1;
  string status = 2;
  string created_at = 3;
  string message = 4;
}

message JobStatusRequest {
  string job_id = 1;
}

message JobStatusResponse {
  string job_id = 1;
  string status = 2;
  float progress_percentage = 3;
  string created_at = 4;
  string updated_at = 5;
  string error_message = 6;
}

message JobLogsRequest {
  string job_id = 1;
}

message JobLogChunk {
  string timestamp = 1;
  string log_line = 2;
}

message WorkflowRequest {
  string workflow_id = 1;
  string name = 2;
  string description = 3;
  string manifest_json = 4;
  string tenant_id = 5;
}

message WorkflowResponse {
  string workflow_id = 1;
  string status = 2;
  int32 total_steps = 3;
  double duration_ms = 4;
}

message ClusterStatusRequest {
  string cluster_id = 1;
}

message ClusterStatusResponse {
  string cluster_id = 1;
  int32 active_workers = 2;
  int32 idle_workers = 3;
  string cluster_health = 4;
}
